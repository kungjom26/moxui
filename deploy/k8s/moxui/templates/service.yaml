apiVersion: v1
kind: Service
metadata:
  name: {{ include "moxui.fullname" . }}
  labels:
    {{- include "moxui.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: {{ .Values.service.name }}
  selector:
    {{- include "moxui.selectorLabels" . | nindent 4 }}
