{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "moxui.fullname" . }}
  labels:
    {{- include "moxui.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "moxui.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow traffic from pods within the same namespace (Service mesh, health checks)
    - from:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              {{- include "moxui.selectorLabels" . | nindent 16 }}
      ports:
        - port: {{ .Values.service.port }}
          protocol: TCP
    # Allow traffic from monitoring (Prometheus Operator)
    - from:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              app.kubernetes.io/name: prometheus
      ports:
        - port: {{ .Values.service.port }}  # /metrics endpoint
          protocol: TCP
    # Allow traffic from ingress controller
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - port: {{ .Values.service.port }}
          protocol: TCP
    # Allow traffic from extra CIDRs
    {{- range .Values.networkPolicy.extraIngressCIDRs }}
    - from:
        - ipBlock:
            cidr: {{ . }}
      ports:
        - port: {{ $.Values.service.port }}
          protocol: TCP
    {{- end }}
  egress:
    # Allow DNS resolution
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # Allow outbound to Proxmox clusters (HTTPS)
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
          # NOTE: In production, restrict this to your Proxmox cluster IPs
      ports:
        - port: 8006
          protocol: TCP
        - port: 443
          protocol: TCP
{{- end }}
