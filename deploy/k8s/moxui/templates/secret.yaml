{{- if not .Values.existingSecret -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "moxui.secretName" . }}
  labels:
    {{- include "moxui.labels" . | nindent 4 }}
type: Opaque
stringData:
  # Cluster passwords — one per cluster entry in values.yaml
  {{- range $i, $pwd := .Values.secrets.clusterPasswords }}
  cluster-password-{{ $i }}: {{ $pwd | quote }}
  {{- end }}
  # JWT private key
  jwt_priv.pem: |-
{{ .Values.secrets.jwtPrivateKey | indent 4 }}
  # JWT public key
  jwt_pub.pem: |-
{{ .Values.secrets.jwtPublicKey | indent 4 }}
  # OIDC secrets (optional)
  {{- if .Values.secrets.oidcClientId }}
  oidc-client-id: {{ .Values.secrets.oidcClientId | quote }}
  {{- end }}
  {{- if .Values.secrets.oidcClientSecret }}
  oidc-client-secret: {{ .Values.secrets.oidcClientSecret | quote }}
  {{- end }}
  {{- if .Values.secrets.encryptionKey }}
  encryption-key: {{ .Values.secrets.encryptionKey | quote }}
  {{- end }}
{{- end }}
