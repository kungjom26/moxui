{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "moxui.serviceAccountName" . }}
  labels:
    {{- include "moxui.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: false
---
# Minimal RBAC — MoxUI does not need to interact with the K8s API,
# so we grant no cluster roles. The ServiceAccount exists only for
# image pull secret attachment and pod identity in cloud environments.
{{- end }}
